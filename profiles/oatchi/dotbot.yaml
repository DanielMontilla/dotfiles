- defaults:
    link:
      relink: true
      create: true
      glob: true
      relative: true

- clean:
    "~/.config/fish/":
      force: true
    "~/.config/nvim/":
      force: true
    "~/.config/herdr/":
      force: true

- link:
    ~/.gitconfig:
      path: profiles/shared/git/gitconfig
      force: true

    ~/.bashrc:
      path: profiles/oatchi/bashrc
      force: true

    ~/.config/fish/:
      path: profiles/shared/fish/*

    ~/.config/nvim/:
      path: profiles/shared/neovim/*

    ~/.config/herdr/:
      path: profiles/shared/herdr/*
      force: true

    ~/.ssh/config:
      path: profiles/oatchi/ssh/config
      force: true
