- defaults:
    link:
      relink: true
      create: true
      glob: true
      relative: true

- clean:
    "~/.config/niri/":
      force: true
    "~/.config/fish/":
      force: true
    "~/.config/nvim/":
      force: true
    "~/.config/quickshell/":
      force: true

- link:
    ~/.gitconfig: profiles/shared/git/gitconfig

    ~/.config/fish/:
      path: profiles/shared/fish/*

    ~/.config/fish/conf.d/:
      path: profiles/louie/fish/*

    ~/.config/niri/:
      path: profiles/louie/niri/*

    ~/.config/nvim/:
      path: profiles/shared/neovim/lazy/*

    ~/.config/starship.toml: profiles/shared/starship/starship.toml

    ~/.config/quickshell/:
      path: profiles/louie/quickshell/*

    ~/.config/ghostty/:
      path: profiles/shared/ghostty/*
