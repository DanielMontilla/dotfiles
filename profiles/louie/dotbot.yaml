- defaults:
    link:
      relink: true
      create: true
      glob: true
      relative: true

- clean:
    "~/.config/niri/":
      force: true
    "~/.config/fish/":
      force: true
    "~/.config/nvim/":
      force: true
    "~/.config/quickshell/":
      force: true
    "~/.config/herdr/":
      force: true
    "~/.config/zed/":
      force: true
    "~/.var/app/dev.zed.Zed/config/zed/":
      force: true

- link:
    ~/.gitconfig: profiles/shared/git/gitconfig

    ~/.ssh/config: profiles/louie/ssh/config

    ~/.config/fish/config.fish: profiles/louie/fish/config.fish
    ~/.config/fish/fish_variables: profiles/louie/fish/fish_variables

    ~/.config/fish/conf.d/:
      path: profiles/louie/fish/conf.d/*

    ~/.config/niri/:
      path: profiles/louie/niri/*

    ~/.config/nvim/:
      path: profiles/shared/neovim/*

    ~/.config/starship.toml: profiles/shared/starship/starship.toml

    ~/.config/quickshell/:
      path: profiles/louie/quickshell/*

    ~/.config/ghostty/:
      path: profiles/shared/ghostty/*

    ~/.config/herdr/:
      path: profiles/louie/herdr/*

    ~/.config/zed/:
      path: profiles/shared/zed/*
    ~/.var/app/dev.zed.Zed/config/zed/:
      path: profiles/shared/zed/*
