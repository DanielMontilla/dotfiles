[LegalNotice]
Accepted=true

[Preferences]
# Bind qBittorrent to the WireGuard interface exclusively.
# This ensures ALL torrent traffic goes through wg0 and NOTHING leaks
# onto your regular network. If wg0 is down, torrents simply stop.
Connection\InterfaceName=wg0
Connection\InterfaceAddress=

# Optional: disable UPnP/NAT-PMP since the VPN won't support it
Connection\UPnP=false

# Optional: enable the Web UI for convenience (disabled by default)
WebUI\Enabled=false

[BitTorrent]
Session\DefaultSavePath=/home/daniel/Downloads/torrents
Session\Interface=wg0
Session\InterfaceName=wg0

