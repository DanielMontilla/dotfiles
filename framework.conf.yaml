- defaults:
    link:
      relink: true
      create: true
      glob: true
      relative: true

- clean:
    "~/.config/niri/":
      force: true
    "~/.config/fish/":
      force: true
    "~/.config/kitty/":
      force: true
    "~/.config/hypr/":
      force: true
    "~/.config/nvim/":
      force: true
    "~/.config/ghostty/":
      force: true
    "~/.config/alacritty/alacritty.toml":
      force: true
    "~/.config/quickshell/":
      force: true
    "~/.config/Cursor/User/":
      force: true
    "~/.config/zellij/":
      force: true
    "~/.config/zed/":
      force: true
    "~/.var/app/dev.zed.Zed/config/zed/":
      force: true
    "~/.config/qBittorrent/":
      force: true

- link:
    ~/.gitconfig: shared/git/gitconfig

    ~/.config/fish/:
      path: shared/fish/*

    ~/.config/kitty/:
      path: shared/kitty/*

    ~/.config/hypr/:
      path: shared/hyprland/*

    ~/.config/niri/:
      path: shared/niri/*

    ~/.config/nvim/:
      path: shared/neovim/lazy/*

    ~/.config/ghostty/:
      path: shared/ghostty/*

    ~/.config/alacritty/alacritty.toml:
      path: shared/alacritty/config.toml

    ~/.config/starship.toml: shared/starship/starship.toml

    ~/.config/quickshell/:
      path: shared/quickshell/*

    ~/.config/Cursor/User/:
      path: shared/cursor/*

    ~/.config/zellij/:
      path: shared/zellij/*

    ~/.config/zed/:
      path: shared/zed/*

    ~/.var/app/dev.zed.Zed/config/zed/:
      path: shared/zed/*

    ~/.config/qBittorrent/:
      path: shared/qbittorrent/*